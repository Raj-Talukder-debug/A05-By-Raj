<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- style sheet -->
    <link rel="stylesheet" href="style/style.css">

    <!-- daisy + tailwind -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- navbar section -->
    <header>

        <section class=" mx-auto navbar bg-base-100 shadow-sm gap-5 flex flex-col md:flex-row justify-between  ">

           
            
                <div class="flex gap-5 items-center">
                    <div class=" w-[60px]">
                        <img class="" src="assets/github-logo.png" alt="">
                    </div>
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                     
                </div>



                <div class="flex gap-5">

                    <input type="text"  placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                    <button id="login-btn" class="btn btn-primary px-10 py-4"> + New Issue</button>

                </div>
        </section>
    </header>


    <!-- btn-section -->

    <section class=" w-[1160px] mx-auto  bg-base-100 shadow-sm mt-8 p-5">
        <button id="all-btn" onclick="" class="btn ">All</button>
        <button id="open-btn" onclick="" class="btn ">Open</button>
        <button id="closed-btn" onclick="" class="btn">Closed</button>
    </section>

    <!-- total issue count section -->

    <section  class=" w-[1160px] mx-auto  bg-base-100 shadow-sm mt-8 p-2 flex justify-between items-center">

        <div class="flex gap-5 items-center">


            <div class="bg-[#ECE4FF] rounded-full p-3">
                <img class="w-[50px]" src="assets/Aperture.png" alt="">
            </div>

            <div>
                <p  class="font-bold"><span id="issue-count"></span> Issues</p>
                <p>Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-10 justify-end items-center">

            <div class="flex items-center gap-2">
                <div class="bg-[#00A96E] w-4 h-4 rounded-full"> </div>
                <span>Open</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-[#A855F7] w-4 h-4 rounded-full"> </div>
                <span>Closed</span>
            </div>
        
        
        </div>

    </section>



    <!-- card section -->


    <section id="card-container" class="w-[1160px] mx-auto  bg-base-100 shadow-sm mt-8 grid grid-cols-4 gap-4 p-10" >

       


    </section>




    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box" >


           <div id="details-container" class="">

            
           </div>



            <p class="py-4">Press ESC key or click the button below to close</p>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script/tab.js"></script>
</body>
</html>
