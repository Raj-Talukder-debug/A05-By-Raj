<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- style sheet -->
    <link rel="stylesheet" href="style/style.css">

    <!-- daisy + tailwind -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>

        <section class="w-11/12 mx-auto navbar bg-base-100 shadow-sm gap-5 flex flex-col md:flex-row justify-between  ">

           
            
                <div class="flex gap-5 items-center">
                    <div class=" w-[60px]">
                        <img class="" src="assets/github-logo.png" alt="">
                    </div>
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                     
                </div>



                <div class="flex gap-5">

                    <input type="text"  placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                    <button id="login-btn" class="btn btn-primary px-10 py-4"> + New Issue</button>

                </div>
        </section>
    </header>
</body>
</html>
