<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- style sheet -->
     <link rel="stylesheet" href="style/style.css">

     <!-- daisy + tailwind -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    

    <section class="min-h-screen w-11/12  mx-auto w-[520px] bg-[#FFFFFF] shadow-md rounded-md">

        <div class="">
            <img class="mx-auto pt-20" src="assets/github-logo.png" alt="">
            <p class="text-center py-10 text-[#64748B]">Sign in to manage your issues</p>
        </div>
        

        
        <div class="flex flex-col gap-5 ">
         
            <div class="px-10">
                <label class="label text-[#1F2937]">Username</label>
                <br>
                <br>
                <input id="input-userName" type="text" class="input w-full" placeholder="Enter Username" />
            </div>


            <div class="px-10">
                <label class="label text-[#1F2937]">Password</label>
                <br>
                <br>
                <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />
            </div>


            <div class="flex  w-full ">
                <button id="login-btn" class="btn btn-primary mt-4 flex-1 py-6">Sign In</button>
            </div>
        </div>
        
           
       

    </section>



    <script src="script/login.js"></script>
</body>
</html>
